apiVersion: apps/v1
kind: Deployment
metadata:
  name: hdfs-log-anomaly-api
  labels:
    app: hdfs-log-anomaly-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hdfs-log-anomaly-api
  template:
    metadata:
      labels:
        app: hdfs-log-anomaly-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: hdfs-log-anomaly-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
